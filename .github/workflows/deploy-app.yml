name: Deploy App (Cloudflare Pages)
on:
  push:
    branches: [main]
    paths: 
      - 'app/**'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install
      - name: Build app
        run: pnpm --filter senta-pua-app build
        env:
          VITE_WORKER_URL: ${{ secrets.VITE_WORKER_URL }}
      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy app/dist --project-name=app-senta-pua --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f42d3e9f5dc41befb6f50847257f5a09
